name: Deploy Azure Functions Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: bc-integration-po-cqhxfrcdakbmgfdd
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish src/BC-Integration-PoC.csproj -c Release -o publish-backend

      - name: Create zip package
        run: |
          cd publish-backend
          zip -r ../deploy.zip .

      - name: Deploy to Azure Functions via Zip Deploy
        env:
          SCM_CREDS: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          # Parse publish profile XML properly using xmllint
          USERNAME=$(echo "$SCM_CREDS" | xmllint --xpath 'string(//publishProfile[@publishMethod="MSDeploy"]/@userName)' -)
          PASSWORD=$(echo "$SCM_CREDS" | xmllint --xpath 'string(//publishProfile[@publishMethod="MSDeploy"]/@userPWD)' -)
          PUBLISH_URL=$(echo "$SCM_CREDS" | xmllint --xpath 'string(//publishProfile[@publishMethod="MSDeploy"]/@publishUrl)' -)
          # Remove port suffix if present (443 is default for HTTPS)
          PUBLISH_URL="${PUBLISH_URL%:443}"
          echo "Deploying to: $PUBLISH_URL"
          echo "Username: $USERNAME"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://${PUBLISH_URL}/api/zipdeploy" \
            --user "$USERNAME:$PASSWORD" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Deploy response code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Response body:"
            echo "$RESPONSE" | head -n -1
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment succeeded!"
