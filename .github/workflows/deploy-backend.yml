name: Deploy Azure Functions Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: bc-integration-po-cqhxfrcdakbmgfdd
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish src/BC-Integration-PoC.csproj -c Release -o publish-backend

      - name: Create zip package
        run: |
          cd publish-backend
          zip -r ../deploy.zip .

      - name: Deploy to Azure Functions via Zip Deploy
        env:
          SCM_CREDS: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          # Write profile to file and use Python to deploy (avoids credential serialization issues)
          echo "$SCM_CREDS" > /tmp/profile.xml
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import subprocess, sys

          tree = ET.parse("/tmp/profile.xml")
          creds = None
          for p in tree.findall(".//publishProfile"):
              if p.get("publishMethod") == "MSDeploy":
                  url = p.get("publishUrl", "")
                  if url.endswith(":443"): url = url[:-4]
                  creds = {
                      "username": p.get("userName", ""),
                      "password": p.get("userPWD", ""),
                      "url": url,
                  }
                  break

          if not creds:
              print("ERROR: No MSDeploy profile found in publish profile XML")
              sys.exit(1)

          print(f"Deploying to: {creds['url']}")
          print(f"Username: {creds['username']}")

          result = subprocess.run([
              "curl", "-s", "-w", "\n%{http_code}", "-X", "POST",
              f"https://{creds['url']}/api/zipdeploy",
              "--user", f"{creds['username']}:{creds['password']}",
              "--data-binary", "@deploy.zip",
              "-H", "Content-Type: application/zip"
          ], capture_output=True, text=True)

          output = result.stdout.strip()
          lines = output.split("\n")
          http_code = lines[-1] if lines else "0"
          body = "\n".join(lines[:-1])

          print(f"Deploy response code: {http_code}")
          if int(http_code) >= 400:
              print(f"Response body: {body}")
              print(f"Deployment failed with HTTP {http_code}")
              sys.exit(1)
          print("Deployment succeeded!")
          PYEOF
          rm -f /tmp/profile.xml
