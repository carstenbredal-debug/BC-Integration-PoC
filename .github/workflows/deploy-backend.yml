name: Deploy Azure Functions Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: bc-integration-po-cqhxfrcdakbmgfdd
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish src/BC-Integration-PoC.csproj -c Release -o publish-backend

      - name: Create zip package
        run: |
          cd publish-backend
          zip -r ../deploy.zip .

      - name: Parse publish profile
        env:
          SCM_CREDS: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        id: parse
        run: |
          echo "$SCM_CREDS" > /tmp/profile.xml
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, os
          tree = ET.parse("/tmp/profile.xml")
          for p in tree.findall(".//publishProfile"):
              if p.get("publishMethod") == "MSDeploy":
                  url = p.get("publishUrl", "")
                  if url.endswith(":443"): url = url[:-4]
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"username={p.get('userName', '')}\n")
                      f.write(f"password={p.get('userPWD', '')}\n")
                      f.write(f"publish_url={url}\n")
                  break
          PYEOF
          rm -f /tmp/profile.xml

      - name: Deploy to Azure Functions via Zip Deploy
        run: |
          echo "Deploying to: ${{ steps.parse.outputs.publish_url }}"
          echo "Username: ${{ steps.parse.outputs.username }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://${{ steps.parse.outputs.publish_url }}/api/zipdeploy" \
            --user "${{ steps.parse.outputs.username }}:${{ steps.parse.outputs.password }}" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Deploy response code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Response body:"
            echo "$RESPONSE" | head -n -1
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment succeeded!"
