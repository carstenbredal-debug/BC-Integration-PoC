name: Deploy Azure Functions Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: bc-integration-po-cqhxfrcdakbmgfdd
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish src/BC-Integration-PoC.csproj -c Release -o publish-backend

      - name: Create zip package
        run: |
          cd publish-backend
          zip -r ../deploy.zip .

      - name: Deploy to Azure Functions via Zip Deploy
        env:
          SCM_CREDS: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo "$SCM_CREDS" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$SCM_CREDS" | grep -oP 'userPWD="\K[^"]+' | head -1)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
            --user "$USERNAME:$PASSWORD" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Deploy response code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment succeeded!"
