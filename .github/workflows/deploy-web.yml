name: Deploy Blazor Frontend

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Blazor WASM
        run: dotnet publish web/web.csproj -c Release -o publish-web

      - name: Inject Function Key
        env:
          FUNCTION_KEY: ${{ secrets.BC_FUNCTION_KEY }}
        if: env.FUNCTION_KEY != ''
        run: |
          sed -i "s/\"FunctionKey\": \"\"/\"FunctionKey\": \"${FUNCTION_KEY}\"/" publish-web/wwwroot/appsettings.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_SAND_046CF2503 }}
          action: upload
          app_location: publish-web/wwwroot
          skip_app_build: true
          skip_api_build: true
